services:

  # ── AMP ───────────────────────────────────────────────────────────────────────
  # Game server management panel. Manages game servers via AMP.
  # Web UI at http://<host-ip>:8080
  amp:
    image: mitchtalmadge/amp-dockerized:latest
    container_name: amp
    mac_address: ${AMP_MAC}
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - USERNAME=${AMP_USERNAME}
      - PASSWORD=${AMP_PASSWORD}
      - LICENCE=${AMP_LICENCE}
      - MODULE=ADS
    volumes:
      - ${DATA_DIR}/ampdata:/home/amp/.ampdata
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
      # Add port mappings for your game servers here, e.g.:
      # - "${GAME_PORT_1}:${GAME_PORT_1}/udp"
      # - "${GAME_PORT_2}:${GAME_PORT_2}/udp"
      # - "25575:25575/tcp"   # RCON (if needed)
    restart: unless-stopped

  # ── Wolf ─────────────────────────────────────────────────────────────────────
  # Moonlight streaming host. Streams containerised desktops/games to Moonlight
  # clients. Config at ${DATA_DIR}/wolf-config/cfg/config.toml
  # Pairing endpoint at http://<host-ip>:47989
  wolf:
    image: ghcr.io/games-on-whales/wolf:stable
    container_name: wolf
    network_mode: host
    environment:
      - XDG_RUNTIME_DIR=/tmp/sockets
      - GOW_RUNTIME_DIR=/tmp/sockets
      - HOST_APPS_STATE_FOLDER=/etc/wolf
      - PULSE_SERVER=unix:/tmp/sockets/pulse-socket
    volumes:
      - ${DATA_DIR}/wolf-config/cfg:/etc/wolf:rw
      - /tmp/sockets:/tmp/sockets:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /var/run/wolf:/var/run/wolf:rw
      - /dev/:/dev/:rw
      - /run/udev/data:/run/udev/data:rw
    devices:
      - /dev/dri:/dev/dri
      - /dev/uinput:/dev/uinput
    restart: unless-stopped

  # ── Wolf WebRTC Sidecar ───────────────────────────────────────────────────────
  # Taps Wolf's GStreamer interpipe output and re-streams to browsers via WebRTC.
  # Does NOT modify Wolf — safe to stop/remove independently.
  # Standalone browser client: http://<host-ip>:8088/client
  # WebSocket signalling:       ws://<host-ip>:8089/<session_id>
  wolf-webrtc:
    build:
      context: ./wolf-webrtc-sidecar
      dockerfile: Dockerfile
    container_name: wolf-webrtc
    network_mode: host
    environment:
      - SIDECAR_HTTP_PORT=8088
      - SIDECAR_WS_PORT=8089
      - STUN_SERVER=stun://stun.l.google.com:19302
      - WOLF_SESSION_IDS=${WOLF_SESSION_IDS:-}
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped
    depends_on:
      - wolf

  # ── Portal ────────────────────────────────────────────────────────────────────
  # nginx serving the GameStack portal UI on port 80.
  # Dashboard, AMP iframe, Wolf stream launcher, network info, docs.
  # Access: http://<host-ip>/
  portal:
    image: nginx:alpine
    container_name: portal
    ports:
      - "80:80"
    volumes:
      - ${DATA_DIR}/portal/html:/usr/share/nginx/html:ro
      - ${DATA_DIR}/portal/docs:/usr/share/nginx/docs:ro
      - ${DATA_DIR}/portal/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - amp
      - wolf

networks:
  default:
    driver: bridge
