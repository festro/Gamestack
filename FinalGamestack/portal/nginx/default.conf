server {
    listen 80;
    server_name _;

    # ── Portal (static files) ─────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── GameStack docs ────────────────────────────────────────────────────
    # Served from /docs/ — maps to the portal/docs/ volume mount
    location /docs/ {
        alias /usr/share/nginx/docs/;
        try_files $uri $uri/ =404;
    }

    # ── WebRTC sidecar API (session list + WebSocket signalling) ──────────
    # Proxied so the browser doesn't need to know the sidecar port
    location /api/sidecar/ {
        proxy_pass         http://wolf-webrtc:8088/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket signalling proxy
    location /ws/ {
        proxy_pass         http://wolf-webrtc:8089/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # ── Health check ──────────────────────────────────────────────────────
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
